workflows:
  ios-release:
    name: iOS IPA Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build IPA
        script: flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - ukwenzyb@gmail.com
        notify:
          success: true
          failure: true