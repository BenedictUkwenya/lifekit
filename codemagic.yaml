workflows:
  ios-release:
    name: iOS IPA Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

      - name: Archive
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA manually
        script: |
          mkdir -p $CM_BUILD_DIR/Payload
          cp -r "$CM_BUILD_DIR/Runner.xcarchive/Products/Applications/Runner.app" $CM_BUILD_DIR/Payload/
          cd $CM_BUILD_DIR && zip -r Lifekit.ipa Payload

    artifacts:
      - $CM_BUILD_DIR/Lifekit.ipa

    publishing:
      email:
        recipients:
          - ukwenzyb@gmail.com
        notify:
          success: true
          failure: true